<style>
:root{--fd:'Cormorant Garamond',Georgia,serif;--fb:'Mulish',sans-serif}
#pageRoot,#pageRoot *{box-sizing:border-box}
#pageRoot{font-family:var(--fb)}
#pageRoot .container{max-width:100%;padding-left:2.5rem;padding-right:2.5rem}
.gh{margin-left:calc(-50vw + 50%);width:100vw;display:flex;height:clamp(300px,42vw,520px);gap:8px;padding:0 8px;background:var(--bg,#111);animation:ghIn .6s ease both;position:relative}
@keyframes ghIn{from{opacity:0}to{opacity:1}}
.gh-hero{position:relative;flex:2;overflow:hidden;border-radius:10px;cursor:zoom-in;min-width:0}
.gh-hero img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .7s ease}
.gh-hero:hover img{transform:scale(1.04)}
.gh-hero::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:1;background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.35) 35%,transparent 60%),linear-gradient(to right,rgba(0,0,0,.25) 0%,transparent 50%)}
.gh-overlay{position:absolute;bottom:0;left:0;right:0;padding:1.75rem 1.75rem 1.5rem;z-index:2}
.gh-back{display:inline-flex;align-items:center;gap:.35rem;color:rgba(255,255,255,.6);text-decoration:none;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.85rem;transition:color .2s}
.gh-back:hover{color:#fff}
.gh-back:hover .arr{transform:translateX(-3px)}
.arr{transition:transform .2s;display:inline-block}
.gh-eyebrow{font-family:var(--fb);font-size:.58rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(205,133,63,.9);margin:0 0 .4rem}
.gh-name{font-family:var(--fd);font-size:clamp(1.6rem,3.2vw,2.9rem);font-weight:700;color:#fff;line-height:1.06;margin:0 0 .7rem;text-shadow:0 2px 10px rgba(0,0,0,.5)}
.gh-tags{display:flex;flex-wrap:wrap;gap:.3rem}
.gh-tag{padding:.16rem .6rem;border-radius:999px;border:1px solid rgba(205,133,63,.5);background:rgba(205,133,63,.15);color:rgba(255,220,150,.9);font-size:.65rem;font-weight:700;text-decoration:none;transition:all .2s;font-family:var(--fb)}
.gh-tag:hover{background:var(--accent-strong);color:#fff;border-color:var(--accent-strong)}
.gh-thumbs{display:flex;flex-direction:column;gap:8px;flex:1;min-width:0;max-width:35%}
.gh-thumb{position:relative;flex:1;overflow:hidden;border-radius:10px;cursor:zoom-in;min-height:0}
.gh-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.gh-thumb:hover img{transform:scale(1.07)}
.gh-thumb::after{content:'⊕';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:rgba(255,255,255,.85);background:rgba(0,0,0,.22);opacity:0;transition:opacity .2s}
.gh-thumb:hover::after{opacity:1}
.gh-thumb-more::after{content:attr(data-more);background:rgba(0,0,0,.6);color:#fff;font-size:1.4rem;font-weight:700;font-family:var(--fb);opacity:1}
.gh-thumb-more:hover::after{background:rgba(0,0,0,.72)}
.gh-placeholder{flex:2;border-radius:10px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(205,133,63,.09),rgba(205,133,63,.02));font-size:5rem;opacity:.18}
.gh-cue{position:absolute;bottom:-19px;left:50%;transform:translateX(-50%);z-index:10;width:38px;height:38px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.25);transition:border-color .2s,transform .2s;animation:cuePop .5s 1s ease both;text-decoration:none;color:var(--accent-strong)}
@keyframes cuePop{from{opacity:0;transform:translateX(-50%) scale(.7)}to{opacity:1;transform:translateX(-50%) scale(1)}}
.gh-cue:hover{border-color:var(--accent-strong);transform:translateX(-50%) translateY(2px)}
.gh-cue svg{animation:cueFloat .9s ease-in-out infinite alternate;display:block}
@keyframes cueFloat{from{transform:translateY(0)}to{transform:translateY(3px)}}
.gh-title{display:none;padding:1.25rem 1rem .5rem;border-bottom:1px solid var(--border)}
.gh-title .gh-back{color:var(--muted);margin-bottom:.6rem}
.gh-title .gh-back:hover{color:var(--accent-strong)}
.gh-title .gh-eyebrow{color:var(--accent-strong)}
.gh-title .gh-name{color:var(--fg);text-shadow:none;font-size:clamp(1.5rem,6vw,2.2rem);margin-bottom:.6rem}

.dp-body{max-width:100%;padding:2.5rem 2rem 5rem}
.dp-lbl{font-family:var(--fb);font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:.75rem}
.dp-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.dp-bio{display:grid;grid-template-columns:260px 1fr;gap:3rem;align-items:flex-start;margin-bottom:3rem}
.dp-portrait-col{display:flex;flex-direction:column;align-items:center;gap:.75rem}
.dp-portrait{width:240px;height:300px;border-radius:10px;object-fit:cover;object-position:center top;border:3px solid var(--accent-strong);box-shadow:0 8px 28px rgba(0,0,0,.35);display:block}
.dp-portrait-cap{font-family:var(--fd);font-size:.85rem;font-style:italic;color:var(--muted);text-align:center;line-height:1.3}
.dp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem 1.25rem;display:flex;flex-wrap:wrap;gap:.75rem 1.75rem;margin-bottom:1.5rem}

.dp-map{display:inline-flex;align-items:center;gap:.4rem;padding:.4rem .9rem;border-radius:7px;border:1px solid var(--accent-strong);color:var(--accent-strong);text-decoration:none;font-size:.75rem;font-weight:700;font-family:var(--fb);transition:all .2s;white-space:nowrap;align-self:center}
.dp-map:hover{background:var(--accent-strong);color:#fff}

.dp-quote{font-family:var(--fd);font-size:clamp(1.25rem,2.2vw,1.65rem);font-style:italic;font-weight:300;color:var(--fg);line-height:1.45;margin:0 0 1.25rem;padding-left:1.1rem;border-left:3px solid var(--accent-strong);opacity:.92}
.dp-bio-body{font-family:var(--fb);font-size:1rem;line-height:1.85;color:var(--fg);opacity:.88;margin:0;white-space:pre-line}
.dp-src-btn{display:flex;align-items:center;justify-content:space-between;width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.25rem;cursor:pointer;color:var(--fg);font-family:var(--fb);font-size:.88rem;font-weight:600;text-align:left;transition:border-color .2s,background .2s}
.dp-src-btn:hover{border-color:var(--accent-strong);background:rgba(205,133,63,.04)}
.dp-src-chev{font-size:.7rem;color:var(--muted);transition:transform .28s}
.dp-src-btn.open .dp-src-chev{transform:rotate(180deg)}
.dp-src-body{display:none;background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;padding:.9rem 1.25rem 1.1rem}
.dp-src-body.open{display:block}
.dp-src-body ul{margin:0;padding:0 0 0 1.1rem;list-style:disc}
.dp-src-body li{font-size:.85rem;color:var(--muted);line-height:1.65;margin-bottom:.25rem;font-family:var(--fb)}
.dp-src-body a{color:var(--accent-strong);text-decoration:none;word-break:break-all}
.dp-src-body a:hover{text-decoration:underline}
.lb,.lb *{box-sizing:border-box}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:9000;align-items:center;justify-content:center;padding:1rem}
.lb.open{display:flex;animation:lbIn .18s ease}
@keyframes lbIn{from{opacity:0}to{opacity:1}}
.lb img{max-width:93vw;max-height:85vh;border-radius:6px;box-shadow:0 24px 80px rgba(0,0,0,.8);animation:lbScale .22s ease}

.lb-x{position:fixed;top:1.5rem;right:1.5rem;background:rgba(30,30,30,.85);border:1px solid rgba(255,255,255,.25);color:#fff;width:48px;height:48px;padding:0;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;backdrop-filter:blur(6px);z-index:100}

#lbPrev{position:fixed;left:1.5rem;top:50%;transform:translateY(-50%)}

.lb-ctr{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:rgba(255,255,255,.75);font-family:var(--fb);font-size:.72rem;font-weight:700;padding:.3rem .9rem;border-radius:999px;backdrop-filter:blur(6px);pointer-events:none}

  .dp-bio{grid-template-columns:1fr;gap:1.5rem}
  .dp-portrait-col{flex-direction:row;align-items:flex-start;gap:1.25rem}

}

#lb .lb-nav,#lb .lb-nav:active,#lb .lb-nav:focus{background:rgba(255,255,255,.1) !important;color:#fff !important;box-shadow:none !important;filter:none !important;border:1px solid rgba(255,255,255,.2) !important}
#lb .lb-nav::before,#lb .lb-nav::after{display:none !important;content:none !important}
.lb-img-wrap{outline:none !important;box-shadow:none !important}
</style>

<script>
/* FIX A: email modal built once and reused, not recreated on every open */
(function(){
  var _m=null;
  function _build(){
    _m=document.createElement('div');_m.id='emailModal';_m.className='email-modal';
    _m.innerHTML='<div class="email-modal-content"><h3>📧 Свържете се с нас</h3><div class="email-address-display">historyaddressbg@gmail.com</div><div class="email-modal-buttons"><button class="btn-copy" id="_ec"><span id="_et">📋 Копирай Email</span></button><button class="btn-close" id="_ex">✕ Затвори</button></div><p>Можете да ни пишете за въпроси или подкрепа</p></div>';
    document.body.appendChild(_m);
    _m.addEventListener('click',function(e){if(e.target===_m)window.closeEmailModal();});
    document.getElementById('_ex').addEventListener('click',window.closeEmailModal);
    document.getElementById('_ec').addEventListener('click',_copy);
  }
  window.handleEmailClick=function(e){if(window.innerWidth<=768)return;e.preventDefault();if(!_m)_build();_m.style.display='flex';document.body.style.overflow='hidden';};
  window.closeEmailModal=function(){if(_m){_m.style.display='none';document.body.style.overflow='';}};
  function _copy(){
    navigator.clipboard.writeText('historyaddressbg@gmail.com').then(function(){
      var b=document.getElementById('_ec'),t=document.getElementById('_et');
      b.classList.add('copied');t.textContent='✓ Копирано!';
      setTimeout(function(){b.classList.remove('copied');t.textContent='📋 Копирай Email';},2000);
    }).catch(function(){alert('Email: historyaddressbg@gmail.com');});
  }
})();
</script>

<script>
(function(){
  function qs(n){var r=new RegExp('[?&]'+n.replace(/[\[\]]/g,'\\$&')+'(=([^&#]*)|&|#|$)').exec(location.href);return r?decodeURIComponent((r[2]||'').replace(/\+/g,' ')):null;}
  function el(t,c){var e=document.createElement(t);if(c)e.className=c;return e;}
  /* FIX B: one reused Intl formatter instead of a new hidden one per call */
  var _df=new Intl.DateTimeFormat('bg-BG',{year:'numeric',month:'long',day:'numeric'});
  function fmt(d){if(!d)return null;var x=new Date(d);return isNaN(x)?d:_df.format(x);}
  /* FIX C: search() finds index without a second regex pass + no extra string copy */
  function fst(t){if(!t)return '';var i=t.search(/[.!?](\s|$)/);return i===-1?t.substring(0,160):t.substring(0,i+1);}
  function scroll(id){var t=document.getElementById(id);if(t)t.scrollIntoView({behavior:'smooth',block:'start'});}

  var slug=qs('slug'),root=document.getElementById('pageRoot');
  var apiBase=location.protocol==='file:'?'http://localhost:3000':location.origin;
  var srcs=[],lbIdx=0;

  document.getElementById('year').textContent=new Date().getFullYear();
  if(!slug){root.innerHTML='<main class="container"><p style="padding:3rem;color:var(--muted)">Не е посочен адрес.</p></main>';return;}
  root.innerHTML='<div style="padding:5rem;text-align:center;color:var(--muted);font-family:Mulish,sans-serif">Зареждане…</div>';

  fetch(apiBase+'/api/homes/'+encodeURIComponent(slug))
    .then(function(r){if(!r.ok)throw new Error(r.status===404?'Адресът не е намерен':'Сървърна грешка');return r.json();})
    .then(function(p){render(p);seo(p);schema(p);})
    .catch(function(e){root.innerHTML='<main class="container"><p style="padding:3rem;color:#f66">Грешка: '+e.message+'</p></main>';});

  function mkTags(tags){
    if(!tags||!tags.length)return '';
    return '<div class="gh-tags">'+tags.map(function(t){return '<a class="gh-tag" href="addresses.html?tag='+encodeURIComponent(t)+'">'+t+'</a>';}).join('')+'</div>';
  }

  function render(p){
    var gal=p.images||[];
    var hasMap=p.coordinates&&p.coordinates.lat&&p.coordinates.lng;
    var mapHref=hasMap?'map.html?slug='+encodeURIComponent(p.slug||p.id):'';
    var hasBio=p.biography||p.portrait_url||p.address||p.birth_date||p.death_date;
    /* FIX D: reset srcs so stale image refs from a previous page don't linger */
    srcs=[];
    gal.forEach(function(i){if(i.path)srcs.push(i.path);});
    var frag=document.createDocumentFragment();

    /* ── GALLERY STRIP ── */
    var gh=el('div','gh');
    if(!gal.length){
      gh.innerHTML='<div class="gh-placeholder">🏛️</div>';
    } else {
      var hero=el('div','gh-hero');
      var hi=el('img'); hi.src=gal[0].path; hi.alt=gal[0].alt||'Сграда — '+p.name; hi.loading='eager';
      /* FIX E: null onerror after first fire — prevents infinite error loops */
      hi.onerror=function(){this.onerror=null;hero.innerHTML='<div class="gh-placeholder" style="flex:1">🏛️</div>';};
      hero.appendChild(hi);
      hero.insertAdjacentHTML('beforeend',
        '<div class="gh-overlay">'+
          '<a class="gh-back" href="addresses.html"><span class="arr">←</span> Всички адреси</a>'+
          '<p class="gh-eyebrow">Адресът на историята</p>'+
          '<h1 class="gh-name">'+(p.name||'—')+'</h1>'+
          mkTags(p.tags)+
        '</div>');
      hero.addEventListener('click',function(){openLb(0);});
      gh.appendChild(hero);
      if(gal.length>1){
        var tc=el('div','gh-thumbs');
        var shown=gal.slice(1,4),rem=gal.length-1-shown.length;
        shown.forEach(function(img,i){
          var isLast=i===shown.length-1&&rem>0;
          var th=el('div',isLast?'gh-thumb gh-thumb-more':'gh-thumb');
          if(isLast)th.setAttribute('data-more','+'+(rem+1));
          var ti=el('img'); ti.src=img.path; ti.alt=img.alt||'Снимка '+(i+2); ti.loading='lazy';
          ti.onerror=function(){this.onerror=null;this.style.display='none';}; /* FIX E */
          th.appendChild(ti);
          (function(gi){th.addEventListener('click',function(){openLb(gi);});})(i+1);
          tc.appendChild(th);
        });
        gh.appendChild(tc);
      }
    }
    if(hasBio){
      var cue=el('a','gh-cue'); cue.href='#dp-bio'; cue.title='Биография';
      cue.innerHTML='<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3.5 6.5l5.5 5.5 5.5-5.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      cue.addEventListener('click',function(e){e.preventDefault();scroll('dp-bio');});
      gh.appendChild(cue);
    }
    var titleBlock=el('div','gh-title');
    titleBlock.innerHTML=
      '<a class="gh-back" href="addresses.html"><span class="arr">←</span> Всички адреси</a>'+
      '<p class="gh-eyebrow">Адресът на историята</p>'+
      '<h1 class="gh-name">'+(p.name||'—')+'</h1>'+
      mkTags(p.tags);
    frag.appendChild(titleBlock);
    frag.appendChild(gh);

    /* ── CONTENT ── */
    var main=el('main','container'),body=el('div','dp-body');
    if(hasBio){
      var lbl=el('div','dp-lbl'); lbl.id='dp-bio'; lbl.textContent='Биография'; body.appendChild(lbl);
      var wrap=el('div','dp-bio');
      if(!p.portrait_url)wrap.style.gridTemplateColumns='1fr';
      if(p.portrait_url){
        var pc=el('div','dp-portrait-col');
        var pi=el('img','dp-portrait'); pi.src=p.portrait_url; pi.alt='Портрет на '+p.name; pi.loading='lazy';
        pi.onerror=function(){this.onerror=null;pc.style.display='none';}; /* FIX E */
        var cap=el('div','dp-portrait-cap'); cap.textContent=p.name;
        pc.appendChild(pi); pc.appendChild(cap); wrap.appendChild(pc);
      }
      var col=el('div');
      var infoItems=[
        p.address?'<div class="dp-ci"><span class="dp-ci-icon">📍</span><div><div class="dp-ci-lbl">Адрес</div><div class="dp-ci-val">'+p.address+'</div></div></div>':'',
        fmt(p.birth_date)?'<div class="dp-ci"><span class="dp-ci-icon">🎂</span><div><div class="dp-ci-lbl">Роден</div><div class="dp-ci-val">'+fmt(p.birth_date)+'</div></div></div>':'',
        fmt(p.death_date)?'<div class="dp-ci"><span class="dp-ci-icon">🕯️</span><div><div class="dp-ci-lbl">Починал</div><div class="dp-ci-val">'+fmt(p.death_date)+'</div></div></div>':'',
        p.photo_date?'<div class="dp-ci"><span class="dp-ci-icon">📷</span><div><div class="dp-ci-lbl">Снимка</div><div class="dp-ci-val">'+p.photo_date+'</div></div></div>':'',
        mapHref?'<a class="dp-map" href="'+mapHref+'">🗺️ Карта <span class="arr">→</span></a>':''
      ].join('');
      if(infoItems.trim())col.insertAdjacentHTML('beforeend','<div class="dp-card">'+infoItems+'</div>');
      if(p.biography){
        var first=fst(p.biography),rest=p.biography.slice(first.length).trim();
        /* FIX F: textContent — no HTML parsing cost, no XSS risk from bio data */
        var bq=el('blockquote','dp-quote'); bq.textContent=first; col.appendChild(bq);
        if(rest){var bp=el('p','dp-bio-body'); bp.textContent=rest; col.appendChild(bp);}
      }
      wrap.appendChild(col); body.appendChild(wrap);
    }
    if(p.sources&&p.sources.length){
      var sl=el('div','dp-lbl'); sl.textContent='Източници'; body.appendChild(sl);
      var ss=el('div');
      var sb=el('button','dp-src-btn');
      sb.innerHTML='📚 Виж всички източници <span style="color:var(--muted);font-weight:400;font-size:.8em;">('+p.sources.length+')</span><span class="dp-src-chev">▼</span>';
      var sd=el('div','dp-src-body');
      sd.innerHTML='<ul>'+p.sources.map(function(s){
        s=s.trim();
        return '<li>'+(/^https?:\/\//i.test(s)?'<a href="'+s+'" target="_blank" rel="noopener noreferrer">'+s+'</a>':s)+'</li>';
      }).join('')+'</ul>';
      sb.addEventListener('click',function(){var o=sd.classList.toggle('open');sb.classList.toggle('open',o);});
      ss.appendChild(sb); ss.appendChild(sd); body.appendChild(ss);
    }
    main.appendChild(body); frag.appendChild(main);
    root.innerHTML=''; root.appendChild(frag);
  }

  /* LIGHTBOX */
  var lb=document.getElementById('lb'),lbImg=document.getElementById('lbImg'),lbCtr=document.getElementById('lbCtr');
  var lbPrev=document.getElementById('lbPrev'),lbNext=document.getElementById('lbNext');

  function openLb(i){lbIdx=i;lbImg.src=srcs[i]||'';lb.classList.add('open');document.body.style.overflow='hidden';upLb();}
  /* FIX G: clear src after close so browser can free the decoded bitmap from RAM */
  function closeLb(){lb.classList.remove('open');document.body.style.overflow='';setTimeout(function(){lbImg.src='';},200);}
  function upLb(){lbPrev.disabled=lbIdx<=0;lbNext.disabled=lbIdx>=srcs.length-1;lbCtr.textContent=srcs.length>1?(lbIdx+1)+' / '+srcs.length:'';}
  function lbStep(d){var n=lbIdx+d;if(n<0||n>=srcs.length)return;lbIdx=n;lbImg.src=srcs[n];upLb();}

  document.getElementById('lbClose').addEventListener('click',closeLb);
  lb.addEventListener('click',function(e){if(e.target===lb)closeLb();});
  lbPrev.addEventListener('click',function(e){e.stopPropagation();lbStep(-1);});
  lbNext.addEventListener('click',function(e){e.stopPropagation();lbStep(1);});
  /* FIX H: merged into one keydown listener — original had two, the second never removed */
  document.addEventListener('keydown',function(e){
    if(lb.classList.contains('open')){
      if(e.key==='ArrowLeft')lbStep(-1);
      if(e.key==='ArrowRight')lbStep(1);
      if(e.key==='Escape')closeLb();
    }else{if(e.key==='Escape')window.closeEmailModal();}
  });
  var tx=0;
  lb.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;},{passive:true});
  lb.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)<40)return;lbStep(dx<0?1:-1);},{passive:true});

  /* SEO — FIX I: query all nodes once at startup, not on every seo() call */
  var _sn=(function(){
    return['meta[name="description"]','link[rel="canonical"]','meta[property="og:url"]','meta[property="og:title"]','meta[property="og:description"]','meta[property="og:image"]','meta[property="twitter:url"]','meta[property="twitter:title"]','meta[property="twitter:description"]','meta[property="twitter:image"]'].map(function(s){return document.querySelector(s);});
  })();
  var _sa=['content','href','content','content','content','content','content','content','content','content'];
  function seo(p){
    var u='https://historyaddress.bg/address.html?slug='+encodeURIComponent(slug);
    var d=p.biography?p.biography.substring(0,155):'Исторически адрес: '+(p.address||'');
    var i=(p.images&&p.images[0]&&p.images[0].path)?'https://historyaddress.bg/'+p.images[0].path:'https://historyaddress.bg/assets/img/HistAdrLogo.png';
    document.title=p.name+' — Адресът на историята';
    var v=[d,u,u,p.name,d,i,u,p.name,d,i];
    for(var j=0;j<_sn.length;j++){if(_sn[j])_sn[j].setAttribute(_sa[j],v[j]);}
  }
  function schema(p){
    var s=document.createElement('script'); s.type='application/ld+json';
    var d={'@context':'https://schema.org','@type':'Place',name:p.name,description:p.biography||'',
      address:{'@type':'PostalAddress',streetAddress:p.address||'',addressCountry:'BG'}};
    if(p.coordinates&&p.coordinates.lat)d.geo={'@type':'GeoCoordinates',latitude:p.coordinates.lat,longitude:p.coordinates.lng};
    if(p.images&&p.images[0])d.image='https://historyaddress.bg/'+p.images[0].path;
    s.textContent=JSON.stringify(d); document.head.appendChild(s);
  }
})();
</script>
