	<script>
	(function() {
		var apiBase = window.location.protocol === 'file:' ? 'http://localhost:3000' : window.location.origin;
		var params = new URLSearchParams(window.location.search);
		var slug = params.get('slug');
		var MONTHS = ['януари','февруари','март','април','май','юни','юли','август','септември','октомври','ноември','декември'];
		var TINTS = [
			'linear-gradient(150deg,#2a1d11,#7a5128)','linear-gradient(150deg,#221c14,#574733)',
			'linear-gradient(150deg,#2e2114,#6b4a24)','linear-gradient(150deg,#1f1813,#4d3f2c)',
			'linear-gradient(150deg,#2a1f12,#8a5e2c)','linear-gradient(150deg,#241a10,#5f4322)',
			'linear-gradient(150deg,#201a13,#52432f)','linear-gradient(150deg,#2c2013,#73502a)'
		];

		document.getElementById('year').textContent = new Date().getFullYear();

		function esc(s){ return String(s == null ? '' : s).replace(/[<>&"]/g, function(c){ return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]; }); }
		function shortDate(d){ var x = new Date(d); if (isNaN(x)) return ''; return x.getDate() + ' ' + MONTHS[x.getMonth()]; }
		function fullDate(d){ var x = new Date(d); if (isNaN(x)) return ''; return x.getDate() + ' ' + MONTHS[x.getMonth()] + ' ' + x.getFullYear(); }
		function tintFor(a){
			if (a.cover_image) return "url('" + a.cover_image.replace(/'/g, '%27').replace(/"/g, '%22') + "')";
			var h = 0, s = a.slug || a.title || '';
			for (var i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) >>> 0;
			return TINTS[h % TINTS.length];
		}
		function readMinutes(content){
			var words = (String(content || '').trim().match(/\S+/g) || []).length;
			return Math.max(1, Math.round(words / 180));
		}
		// Content is admin-authored (trusted). Turn blank-line groups into paragraphs.
		function renderBody(content){
			var src = String(content || '').trim();
			if (/<(p|h2|h3|ul|ol|blockquote|figure|img)\b/i.test(src)) return src; // already HTML
			return src.split(/\n{2,}/).map(function(p){
				return '<p>' + p.trim().replace(/\n/g, '<br>') + '</p>';
			}).join('');
		}

		if (!slug) {
			document.getElementById('articleContent').innerHTML = '<article class="nx-article"><p class="nx-empty" style="color:#ff6b6b">Невалиден линк</p></article>';
			return;
		}

		fetch(apiBase + '/api/news/' + encodeURIComponent(slug))
			.then(function(res){ if (!res.ok) throw new Error('Not found'); return res.json(); })
			.then(function(a){
				document.title = a.title + ' - Адресът на историята';
				var read = readMinutes(a.content);
				var kicker = (a.place ? esc(a.place) + ' · ' : '') + esc(shortDate(a.published_date));
				var html =
					'<article class="nx-article" id="articleBody">' +
						'<div class="nx-art-head">' +
							'<div class="nx-art-kicker">' + (kicker || 'Новина') + '</div>' +
							'<h1 class="nx-art-title">' + esc(a.title) + '</h1>' +
							(a.excerpt ? '<p class="nx-art-deck">' + esc(a.excerpt) + '</p>' : '') +
							'<div class="nx-art-byline">' +
								'<span class="nx-author">' + esc(a.author || '') + '</span>' +
								'<span>·</span><span>' + esc(fullDate(a.published_date)) + '</span>' +
								'<span>·</span><span>' + read + ' мин четене</span>' +
							'</div>' +
						'</div>' +
						'<div class="nx-hero" style="background:' + tintFor(a) + ';background-size:cover;background-position:center">' +
							'<div class="nx-grain"></div>' +
							'<div class="nx-vignette"></div>' +
							'<span class="nx-photo-cap">ФОТО · АРХИВ „АДРЕСЪТ“</span>' +
						'</div>' +
						'<div class="nx-art-cap">' + esc(a.title) + ' · Архив „Адресът на историята“.</div>' +
						'<div class="ar-body">' + renderBody(a.content) + '</div>' +
					'</article>';
				document.getElementById('articleContent').innerHTML = html;
				initProgress();
				loadRelated(a.slug);
			})
			.catch(function(err){
				console.error('Error loading article:', err);
				document.getElementById('articleContent').innerHTML = '<article class="nx-article"><p class="nx-empty" style="color:#ff6b6b">Новината не е намерена</p></article>';
			});

		// ── Reading progress ──────────────────────────────────────────────
		function initProgress(){
			var bar = document.getElementById('readProgress');
			var onScroll = function(){
				var el = document.getElementById('articleBody');
				if (!el) return;
				var r = el.getBoundingClientRect();
				var total = r.height - window.innerHeight;
				var passed = Math.min(Math.max(-r.top, 0), Math.max(total, 1));
				var pct = total > 0 ? Math.min(100, (passed / total) * 100) : 0;
				bar.style.width = pct.toFixed(1) + '%';
			};
			window.addEventListener('scroll', onScroll, { passive: true });
			window.addEventListener('resize', onScroll, { passive: true });
			onScroll();
		}

		// ── Related ───────────────────────────────────────────────────────
		function loadRelated(currentSlug){
			fetch(apiBase + '/api/news?page=1&limit=4')
				.then(function(r){ return r.ok ? r.json() : { data: [] }; })
				.then(function(res){
					var items = (res.data || []).filter(function(x){ return x.slug !== currentSlug; }).slice(0, 3);
					if (!items.length) return;
					var cards = items.map(function(a){
						var ext = a.link && /^https?:\/\//i.test(a.link);
						var href = ext ? a.link : 'news-article.html?slug=' + encodeURIComponent(a.slug);
						var attrs = 'href="' + esc(href) + '"' + (ext ? ' target="_blank" rel="noopener noreferrer"' : '');
						var dl = (a.place ? esc(a.place) + ' · ' : '') + esc(shortDate(a.published_date));
						var read = a.read_minutes ? a.read_minutes + ' мин' : '';
						return '<a class="nx-card" ' + attrs + '>' +
							'<div class="nx-imgwrap">' +
								'<div class="nx-img" style="background:' + tintFor(a) + ';background-size:cover;background-position:center"></div>' +
								'<div class="nx-grain"></div>' +
							'</div>' +
							'<div class="nx-card-dateline">' + dl + '</div>' +
							'<h3 class="nx-title">' + esc(a.title) + '</h3>' +
							(read ? '<div class="nx-card-foot"><span>' + read + '</span></div>' : '') +
						'</a>';
					}).join('');
					document.getElementById('relatedSection').innerHTML =
						'<div class="nx-related">' +
							'<div class="nx-sec-head" style="border-bottom:2px solid var(--nx-gold)"><div class="nx-sec-title">Продължете да четете</div></div>' +
							'<div class="nx-grid">' + cards + '</div>' +
						'</div>';
				})
				.catch(function(){});
		}
	})();
	</script>
