<!doctype html>
<html lang="bg" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/png" href="/assets/img/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
    <link rel="shortcut icon" href="/assets/img/favicon.ico" />

    <title>Техническа поддръжка - Адресът на историята</title>
    <meta name="description" content="Сайтът е в техническа поддръжка. Връщаме се скоро.">
    <meta name="robots" content="noindex, nofollow">

    <script>
        (function() {
            try {
                var stored = localStorage.getItem('theme-preference');
                if (stored === 'system') stored = 'dark';
                var theme = (stored === 'dark' || stored === 'light') ? stored : 'dark';
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) {}
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Mulish:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/styles.css?v=7">

    <style>
        :root { --font-display: 'Cormorant Garamond', Georgia, serif; --font-body: 'Mulish', sans-serif; }

        .mt-page { min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; position: relative; overflow: hidden; }
        .mt-page * { font-family: var(--font-body); }
        .mt-page::before {
            content: ''; position: absolute; top: 38%; left: 50%;
            width: min(680px, 92vw); height: min(680px, 92vw); transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(205,133,63,0.16), transparent 62%);
            pointer-events: none; z-index: 0;
        }

        .mt-card { position: relative; z-index: 1; max-width: 560px; text-align: center; }

        .mt-logo { width: 96px; height: auto; margin-bottom: 1.6rem; filter: drop-shadow(0 8px 18px rgba(0,0,0,0.35)); }

        .mt-emblem {
            width: 78px; height: 78px; margin: 0 auto 1.6rem; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-strong);
            border: 1px solid rgba(205,133,63,0.4); background: rgba(205,133,63,0.08);
            box-shadow: 0 0 0 6px rgba(205,133,63,0.06);
        }
        .mt-emblem svg { animation: mtSpin 9s linear infinite; }
        @keyframes mtSpin { to { transform: rotate(360deg); } }

        .mt-eyebrow {
            font-size: 0.78rem; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase;
            color: var(--accent-strong); margin: 0 0 0.9rem;
        }
        .mt-title {
            font-family: var(--font-display); font-weight: 700; color: var(--fg);
            font-size: clamp(1.9rem, 5vw, 2.8rem); line-height: 1.18; margin: 0 0 1.1rem;
        }
        .mt-text { font-size: 1.05rem; color: var(--muted); line-height: 1.7; max-width: 470px; margin: 0 auto 2rem; }

        .mt-dots { display: flex; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; }
        .mt-dots span { width: 9px; height: 9px; border-radius: 50%; background: var(--accent-strong); opacity: 0.4; animation: mtPulse 1.4s ease-in-out infinite; }
        .mt-dots span:nth-child(2) { animation-delay: 0.2s; }
        .mt-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes mtPulse { 0%, 100% { opacity: 0.3; transform: scale(0.85); } 50% { opacity: 1; transform: scale(1); } }

        .mt-social {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.7rem 1.5rem; border-radius: 30px; text-decoration: none;
            border: 1px solid var(--border); color: var(--fg);
            font-weight: 700; font-size: 0.92rem; transition: border-color 0.3s, color 0.3s, transform 0.3s;
        }
        .mt-social:hover { border-color: var(--accent-strong); color: var(--accent-strong); transform: translateY(-2px); }
    </style>
</head>

<body class="mt-page">
    <div class="mt-card">
        <img class="mt-logo" src="/assets/img/HistAdrLogo.png" alt="Адресът на историята">

        <div class="mt-emblem" aria-hidden="true">
            <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>

        <p class="mt-eyebrow">Техническа поддръжка</p>
        <h1 class="mt-title">Връщаме се след малко</h1>
        <p class="mt-text">
            Сайтът е в техническа поддръжка. Връщаме се след малко с нови исторически
            обекти и подобрения! Благодарим Ви за търпението.
        </p>

        <div class="mt-dots" aria-hidden="true"><span></span><span></span><span></span></div>

        <a class="mt-social" href="https://instagram.com/historyaddress.bg" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
            Следете ни в Instagram
        </a>
    </div>
</body>
</html>
