    <style>
        :root { --font-display: 'Cormorant Garamond', Georgia, serif; --font-body: 'Mulish', sans-serif;
                --c-birth: #cd853f; --c-death: #b0746a; }
        .cal-page, .cal-page * { font-family: var(--font-body); }
        .cal-wrap { max-width: 1080px; margin: 0 auto; padding: clamp(1.5rem, 4vw, 3rem) 1.25rem 5rem; }

        .cal-head { text-align: center; margin-bottom: 1.75rem; }
        .cal-eyebrow { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent-strong); margin: 0 0 0.5rem; }
        .cal-title { font-family: var(--font-display); font-size: clamp(2rem, 5vw, 3rem); font-weight: 700; color: var(--fg); margin: 0; line-height: 1.05; }
        .cal-subtitle { color: var(--muted); font-size: 1rem; margin: 0.6rem 0 0; }

        [hidden] { display: none !important; }

        /* Gold pill link (reused by the selected-person box) */
        .cal-spot-link { display: inline-flex; align-items: center; gap: 0.45rem; font-weight: 700; font-size: 0.88rem; color: #1a1410; background: var(--accent-gradient); padding: 0.5rem 1.1rem; border-radius: 999px; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
        .cal-spot-link:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(205,133,63,0.4); }

        /* ── Selected person box (from search) ── */
        .cal-person-box:empty { display: none; }
        .cal-person { position: relative; display: flex; align-items: center; gap: 1rem; max-width: 560px; margin: 0 auto 1.75rem; background: radial-gradient(120% 140% at 0% 0%, rgba(205,133,63,0.12), transparent 60%), var(--card); border: 1px solid rgba(205,133,63,0.35); border-radius: 16px; padding: 1rem 1.1rem; box-shadow: var(--shadow-soft); animation: calIn 0.3s ease both; }
        .cal-person-photo { width: 68px; height: 68px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent-strong); flex-shrink: 0; background: var(--border); }
        .cal-person-photo.ph { display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 1.5rem; color: #1a1410; background: var(--accent-gradient); }
        .cal-person-info { flex: 1; min-width: 0; }
        .cal-person-eyebrow { font-size: 0.64rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent-strong); margin-bottom: 0.15rem; }
        .cal-person-name { font-family: var(--font-display); font-size: 1.45rem; font-weight: 700; color: var(--fg); line-height: 1.1; }
        .cal-person-meta { font-size: 0.82rem; color: var(--muted); margin: 0.2rem 0 0.65rem; }
        .cal-person-close { position: absolute; top: 0.45rem; right: 0.55rem; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; line-height: 1; padding: 0.25rem; }
        .cal-person-close::before { display: none !important; }
        .cal-person-close:hover { color: var(--fg); transform: none !important; box-shadow: none !important; }

        /* ── Search ── */
        .cal-search-wrap { position: relative; max-width: 560px; margin: 0 auto 1.75rem; }
        .cal-search { width: 100%; box-sizing: border-box; padding: 0.8rem 1rem 0.8rem 2.7rem; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--fg); font-size: 0.95rem; }
        .cal-search:focus { outline: none; border-color: var(--accent-strong); box-shadow: 0 0 0 3px rgba(205,133,63,0.15); }
        .cal-search-ico { position: absolute; left: 0.95rem; top: 0.85rem; color: var(--muted); }
        .cal-search-results { position: absolute; left: 0; right: 0; top: calc(100% + 0.4rem); z-index: 30; background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 16px 40px rgba(0,0,0,0.4); overflow: hidden; }
        .cal-search-results:empty { display: none; }
        .cal-sr { display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 0.85rem; cursor: pointer; border-bottom: 1px solid var(--border); }
        .cal-sr:last-child { border-bottom: none; }
        .cal-sr:hover { background: rgba(205,133,63,0.1); }
        .cal-sr-photo { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--border); }
        .cal-sr-photo.ph { display: flex; align-items: center; justify-content: center; font-weight: 700; color: #1a1410; background: var(--accent-soft); }
        .cal-sr-name { font-weight: 700; color: var(--fg); font-size: 0.92rem; }
        .cal-sr-dates { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
        .cal-sr-empty { padding: 0.8rem 0.9rem; color: var(--muted); font-size: 0.85rem; }

        /* ── Toolbar ── */
        .cal-toolbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 0.9rem; margin-bottom: 1rem; }
        .cal-nav { display: flex; align-items: center; gap: 0.4rem; position: relative; }
        .cal-arrow, .cal-today { display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border); background: var(--card); color: var(--fg); cursor: pointer; border-radius: 10px; font-family: var(--font-body); transition: all 0.2s; }
        .cal-arrow::before, .cal-today::before, .cal-month-title::before, .cal-chip::before, .cal-vbtn::before, .cal-surprise::before { display: none !important; }
        .cal-arrow { width: 38px; height: 38px; font-size: 1rem; }
        .cal-arrow:hover, .cal-today:hover { border-color: var(--accent-strong); color: var(--accent-strong); transform: none !important; box-shadow: none !important; }
        .cal-month-title { font-family: var(--font-display); font-size: 1.65rem; font-weight: 700; color: var(--fg); background: none; border: none; cursor: pointer; padding: 0.2rem 0.7rem; min-width: 10.5rem; text-align: center; }
        .cal-month-title:hover { color: var(--accent-strong); transform: none !important; box-shadow: none !important; }
        .cal-today { padding: 0 0.95rem; height: 38px; font-size: 0.82rem; font-weight: 700; }
        .cal-right { display: flex; align-items: center; gap: 0.9rem; flex-wrap: wrap; }
        .cal-filters, .cal-views { display: flex; gap: 0.3rem; padding: 0.25rem; background: var(--card); border: 1px solid var(--border); border-radius: 11px; }
        .cal-chip, .cal-vbtn { display: inline-flex; align-items: center; gap: 0.35rem; border: none; background: transparent; color: var(--muted); cursor: pointer; font-family: var(--font-body); font-size: 0.82rem; font-weight: 700; padding: 0.4rem 0.8rem; border-radius: 8px; white-space: nowrap; transition: color 0.2s, background 0.2s; }
        .cal-chip:hover, .cal-vbtn:hover { color: var(--fg); }
        .cal-chip.active { background: var(--accent-gradient); color: #1a1410; }
        .cal-chip.active.death { background: linear-gradient(135deg, #b0746a, #c89a8a); color: #1a1410; }
        .cal-vbtn.active { background: var(--accent-gradient); color: #1a1410; }
        .cal-dot { width: 9px; height: 9px; border-radius: 50%; }
        .cal-dot.birth { background: var(--c-birth); } .cal-dot.death { background: var(--c-death); }

        /* month picker popover */
        .cal-picker { position: absolute; top: calc(100% + 0.5rem); left: 50%; transform: translateX(-50%); z-index: 40; width: 280px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 18px 48px rgba(0,0,0,0.45); padding: 0.9rem; display: none; }
        .cal-picker.show { display: block; }
        .cal-picker-yr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; }
        .cal-picker-yr span { font-family: var(--font-display); font-weight: 700; font-size: 1.2rem; color: var(--fg); }
        .cal-picker-yr button { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--fg); cursor: pointer; }
        .cal-picker-yr button::before { display: none !important; }
        .cal-picker-months { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.4rem; }
        .cal-picker-months button { padding: 0.5rem 0; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--fg); cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.15s; }
        .cal-picker-months button::before { display: none !important; }
        .cal-picker-months button:hover { border-color: var(--accent-strong); color: var(--accent-strong); }
        .cal-picker-months button.cur { background: var(--accent-gradient); color: #1a1410; border-color: transparent; }

        .cal-stats { text-align: center; color: var(--muted); font-size: 0.85rem; margin-bottom: 1.1rem; }
        .cal-stats strong { color: var(--accent-strong); }

        /* ── Month grid ── */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; transition: opacity 0.25s ease, transform 0.25s ease; }
        .cal-grid.fading { opacity: 0; transform: translateY(6px); }
        .cal-dow { text-align: center; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); padding: 0.3rem 0; }
        .cal-cell { position: relative; min-height: 94px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); padding: 0.55rem 0.5rem; display: flex; flex-direction: column; align-items: center; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
        .cal-cell.other { opacity: 0.35; background: transparent; border-color: transparent; }
        .cal-cell.has { cursor: pointer; }
        .cal-cell.has:hover { transform: translateY(-3px); border-color: var(--accent-strong); box-shadow: var(--shadow); }
        .cal-cell.today { border-color: var(--accent-strong); background: linear-gradient(160deg, rgba(205,133,63,0.22), rgba(205,133,63,0.05)); box-shadow: 0 0 0 2px var(--accent-strong) inset, 0 6px 18px rgba(205,133,63,0.22); }
        .cal-cell.sel { border-color: var(--accent-strong); box-shadow: 0 0 0 2px rgba(205,133,63,0.5); }
        .cal-cell-num { font-family: var(--font-display); font-size: 1.45rem; font-weight: 700; color: var(--fg); line-height: 1; margin-top: 0.15rem; text-align: center; }
        .cal-cell.today .cal-cell-num { color: #1a1410; background: var(--accent-gradient); width: 1.95rem; height: 1.95rem; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.3); }
        .cal-cell-dots { display: flex; gap: 4px; margin-top: auto; padding-top: 0.4rem; flex-wrap: wrap; justify-content: center; }
        .cal-cell-dots .d { width: 8px; height: 8px; border-radius: 50%; }
        .cal-cell-dots .d.birth { background: var(--c-birth); } .cal-cell-dots .d.death { background: var(--c-death); }

        /* ── Agenda view ── */
        .cal-agenda { display: flex; flex-direction: column; gap: 1.4rem; }
        .cal-agenda-day { }
        .cal-agenda-date { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--accent-strong); margin: 0 0 0.6rem; display: flex; align-items: baseline; gap: 0.5rem; }
        .cal-agenda-date small { font-size: 0.8rem; color: var(--muted); font-family: var(--font-body); font-weight: 600; }
        .cal-agenda-empty, .cal-grid-empty { text-align: center; color: var(--muted); padding: 3rem 1rem; background: var(--card); border: 1px dashed var(--border); border-radius: 16px; }

        /* ── Event cards ── */
        .cal-events { margin-top: 1.6rem; }
        .cal-events-title { font-family: var(--font-display); font-size: 1.4rem; font-weight: 700; color: var(--fg); margin: 0 0 0.9rem; }
        .cal-ev { display: flex; align-items: center; gap: 0.85rem; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 0.7rem 0.85rem; text-decoration: none; color: inherit; margin-bottom: 0.6rem; box-shadow: var(--shadow-soft); transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; animation: calIn 0.35s ease both; }
        .cal-ev:hover { transform: translateX(3px); border-color: var(--accent-strong); box-shadow: var(--shadow); }
        @keyframes calIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
        .cal-ev-photo { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--border); }
        .cal-ev-photo.ph { display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 1.3rem; color: #1a1410; background: var(--accent-gradient); }
        .cal-ev-body { flex: 1; min-width: 0; }
        .cal-ev-name { font-family: var(--font-display); font-size: 1.25rem; font-weight: 700; color: var(--fg); line-height: 1.15; }
        .cal-ev-meta { font-size: 0.83rem; color: var(--muted); margin-top: 0.15rem; display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; }
        .cal-ev-type { display: inline-flex; align-items: center; gap: 0.3rem; font-weight: 700; padding: 0.12rem 0.55rem; border-radius: 999px; font-size: 0.74rem; }
        .cal-ev-type.birth { background: rgba(205,133,63,0.15); color: var(--c-birth); }
        .cal-ev-type.death { background: rgba(176,116,106,0.16); color: var(--c-death); }
        .cal-ev-arrow { color: var(--accent-strong); font-size: 1.2rem; flex-shrink: 0; }

        .cal-surprise-wrap { text-align: center; margin-top: 2.2rem; }
        .cal-surprise { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.7rem 1.5rem; border-radius: 999px; border: 1px solid var(--accent-strong); background: transparent; color: var(--accent-strong); font-family: var(--font-body); font-weight: 700; font-size: 0.92rem; cursor: pointer; transition: background 0.2s, color 0.2s, transform 0.2s; }
        .cal-surprise:hover { background: var(--accent-strong); color: #fff; transform: translateY(-2px); }

        @media (max-width: 640px) {
            .cal-cell { min-height: 68px; padding: 0.4rem 0.25rem; border-radius: 9px; }
            .cal-cell-num { font-size: 1.2rem; margin-top: 0.1rem; }
            .cal-cell.today .cal-cell-num { width: 1.65rem; height: 1.65rem; }
            .cal-cell-dots { gap: 3px; padding-top: 0.3rem; }
            .cal-cell-dots .d { width: 7px; height: 7px; }
            .cal-grid { gap: 0.3rem; }
            /* styles.css has a mobile `button:not(#theme-toggle)` touch rule whose :not(#id)
               gives it ID-level specificity, so we need !important to keep the toolbar compact. */
            .cal-month-title { font-size: 1.45rem !important; min-width: 0; min-block-size: 0 !important; padding: 0.2rem 0.5rem !important; }
            .cal-toolbar { justify-content: center; }
            .cal-right { justify-content: center; width: 100%; gap: 0.5rem; }
            .cal-filters, .cal-views { gap: 0.15rem; padding: 0.2rem; }
            .cal-chip, .cal-vbtn { font-size: 0.74rem !important; padding: 0.42rem 0.55rem !important; gap: 0.25rem; min-block-size: 0 !important; }
            .cal-arrow, .cal-today { min-block-size: 0 !important; padding: 0 0.7rem !important; }
            .cal-arrow { padding: 0 !important; }
            .cal-dot { width: 8px; height: 8px; }
        }
    </style>

<script>
function handleEmailClick(event) {
    if (window.innerWidth <= 768) return;
    event.preventDefault();
    var m = document.getElementById('emailModal');
    if (!m) {
        m = document.createElement('div'); m.id = 'emailModal'; m.className = 'email-modal';
        m.innerHTML = '<div class="email-modal-content"><h3>📧 Свържете се с нас</h3><div class="email-address-display">historyaddressbg@gmail.com</div><div class="email-modal-buttons"><button class="btn-copy" onclick="navigator.clipboard.writeText(\'historyaddressbg@gmail.com\')">📋 Копирай</button><button class="btn-close" onclick="document.getElementById(\'emailModal\').style.display=\'none\';document.body.style.overflow=\'\'">✕ Затвори</button></div></div>';
        document.body.appendChild(m);
        m.addEventListener('click', function(e){ if (e.target === m) { m.style.display='none'; document.body.style.overflow=''; } });
    }
    m.style.display = 'flex'; document.body.style.overflow = 'hidden';
}
</script>

<script>
(function() {
    document.getElementById('year').textContent = new Date().getFullYear();

    var MONTHS = ['Януари','Февруари','Март','Април','Май','Юни','Юли','Август','Септември','Октомври','Ноември','Декември'];
    var DOW = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];

    var state = { month: new Date().getMonth() + 1, year: new Date().getFullYear(), filter: 'all', view: 'grid', selected: null };
    try { var s = JSON.parse(sessionStorage.getItem('cal-state') || 'null'); if (s) { state.month = s.month; state.year = s.year; state.filter = s.filter || 'all'; state.view = s.view || 'grid'; state.selected = s.selected || null; } } catch(e) {}
    // When returning via the browser Back button after opening an address, scroll the
    // user back down to the day list they were viewing.
    var pendingReturn = false;
    try { if (sessionStorage.getItem('cal-return')) { sessionStorage.removeItem('cal-return'); pendingReturn = !!state.selected; } } catch(e) {}
    document.addEventListener('click', function(e){ if (e.target.closest('a.cal-ev, a.cal-spot-link')) { try { sessionStorage.setItem('cal-return', '1'); } catch(_) {} } });
    var events = {};        // 'MM-DD' -> [event]
    var allPeople = [];

    function save() { try { sessionStorage.setItem('cal-state', JSON.stringify(state)); } catch(e) {} }
    function esc(t) { return String(t == null ? '' : t).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
    function initial(name) { return (name || '?').trim().charAt(0).toUpperCase() || '?'; }
    function yr(d) { return d ? d.slice(0, 4) : ''; }
    function yearsWord(n) { return n + ' ' + (n === 1 ? 'година' : 'години'); }
    function passFilter(ev) { return state.filter === 'all' || ev.type === state.filter; }

    // Image fallback chain: thumbnail → full image → initial placeholder. Portraits may
    // lack a generated _thumb.jpg; if so we retry the full file before giving up.
    window.calImgErr = function(img) {
        var s = img.getAttribute('src') || '';
        if (/_thumb\.jpg$/i.test(s)) { img.src = s.replace(/_thumb\.jpg$/i, '.jpg'); return; }
        var ini = img.getAttribute('data-ini') || '?';
        img.outerHTML = '<div class="' + img.className + ' ph">' + ini + '</div>';
    };
    function photoHtml(ev, cls) {
        var ini = esc(initial(ev.name));
        if (ev.image) return '<img class="' + cls + '" src="' + esc(ev.image) + '" alt="" loading="lazy" data-ini="' + ini + '" onerror="calImgErr(this)">';
        return '<div class="' + cls + ' ph">' + ini + '</div>';
    }

    // ── Month load + render ──
    function load() {
        save();
        fetch('/api/calendar?month=' + state.month + '&year=' + state.year)
            .then(function(r){ return r.json(); })
            .then(function(data){
                events = data || {}; render();
                if (pendingReturn) { pendingReturn = false; var el = document.getElementById('eventsList'); if (el && el.innerHTML) el.scrollIntoView({ block: 'start' }); }
            });
    }

    function countMonth() {
        var b = 0, d = 0;
        Object.keys(events).forEach(function(k){ events[k].forEach(function(e){ if (e.type === 'birth') b++; else d++; }); });
        return { b: b, d: d, total: b + d };
    }

    function render() {
        document.getElementById('monthYear').textContent = MONTHS[state.month - 1] + ' ' + state.year;
        // filter buttons / view buttons reflect state
        Array.prototype.forEach.call(document.querySelectorAll('.cal-chip'), function(c){ c.classList.toggle('active', c.getAttribute('data-filter') === state.filter); c.classList.toggle('death', c.getAttribute('data-filter') === 'death'); });
        Array.prototype.forEach.call(document.querySelectorAll('.cal-vbtn'), function(c){ c.classList.toggle('active', c.getAttribute('data-view') === state.view); });

        var c = countMonth();
        document.getElementById('calStats').innerHTML = c.total
            ? '<strong>' + c.total + '</strong> годишнини · 🎂 ' + c.b + ' рождени дни · 🕯️ ' + c.d + ' кончини'
            : 'Няма отбелязани годишнини през ' + MONTHS[state.month - 1].toLowerCase() + '.';

        document.getElementById('gridView').hidden = state.view !== 'grid';
        document.getElementById('agendaView').hidden = state.view !== 'agenda';
        if (state.view === 'grid') renderGrid(); else renderAgenda();
        if (state.selected) showDay(state.selected); else document.getElementById('eventsList').innerHTML = '';
    }

    function dayEvents(dd) { return (events[state.mm + '-' + dd] || []).filter(passFilter); }

    function renderGrid() {
        state.mm = String(state.month).padStart(2, '0');
        var grid = document.getElementById('calendarGrid');
        grid.classList.add('fading');
        setTimeout(function() {
            grid.innerHTML = '';
            DOW.forEach(function(d){ var h = document.createElement('div'); h.className = 'cal-dow'; h.textContent = d; grid.appendChild(h); });
            var y = state.year, m = state.month - 1;
            var first = (new Date(y, m, 1).getDay() + 6) % 7;   // Monday-first
            var days = new Date(y, m + 1, 0).getDate();
            var today = new Date();
            for (var i = 0; i < first; i++) { var o = document.createElement('div'); o.className = 'cal-cell other'; grid.appendChild(o); }
            for (var day = 1; day <= days; day++) {
                var dd = String(day).padStart(2, '0');
                var evs = dayEvents(dd);
                var cell = document.createElement('div');
                cell.className = 'cal-cell' + (evs.length ? ' has' : '') +
                    (today.getDate() === day && today.getMonth() === m && today.getFullYear() === y ? ' today' : '') +
                    (state.selected === dd ? ' sel' : '');
                var dotsHtml = '';
                if (evs.length) {
                    var shown = evs.slice(0, 6).map(function(e){ return '<span class="d ' + e.type + '"></span>'; }).join('');
                    dotsHtml = '<div class="cal-cell-dots">' + shown + '</div>';
                }
                cell.innerHTML = '<div class="cal-cell-num">' + day + '</div>' + dotsHtml;
                if (evs.length) { (function(dd){ cell.addEventListener('click', function(){ select(dd); }); })(dd); }
                grid.appendChild(cell);
            }
            grid.classList.remove('fading');
        }, 120);
    }

    function renderAgenda() {
        state.mm = String(state.month).padStart(2, '0');
        var wrap = document.getElementById('agendaView');
        var days = Object.keys(events).map(function(k){ return k.split('-')[1]; })
            .filter(function(dd, i, arr){ return arr.indexOf(dd) === i; })
            .filter(function(dd){ return dayEvents(dd).length; })
            .sort();
        if (!days.length) { wrap.innerHTML = '<div class="cal-agenda-empty">Няма годишнини за избрания филтър през този месец.</div>'; return; }
        wrap.innerHTML = days.map(function(dd){
            var evs = dayEvents(dd);
            return '<div class="cal-agenda-day"><h3 class="cal-agenda-date">' + parseInt(dd) + ' ' + MONTHS[state.month - 1] +
                ' <small>' + evs.length + (evs.length === 1 ? ' годишнина' : ' годишнини') + '</small></h3>' +
                evs.map(evCard).join('') + '</div>';
        }).join('');
    }

    function evCard(ev) {
        // A custom date_label (e.g. "Построена през") overrides the default Роден/Починал.
        var verb = ev.date_label ? esc(ev.date_label) : (ev.type === 'birth' ? 'Роден(а)' : 'Починал(а)');
        var icon = ev.date_label ? '📅' : (ev.type === 'birth' ? '🎂' : '🕯️');
        var lifespan = (ev.birth_date && ev.death_date) ? ' · ' + yr(ev.birth_date) + '–' + yr(ev.death_date) : '';
        return '<a class="cal-ev" href="address.html?slug=' + encodeURIComponent(ev.slug) + '">' +
            photoHtml(ev, 'cal-ev-photo') +
            '<div class="cal-ev-body"><div class="cal-ev-name">' + esc(ev.name) + '</div>' +
            '<div class="cal-ev-meta"><span class="cal-ev-type ' + ev.type + '">' + icon + ' ' + verb + '</span> преди ' + yearsWord(ev.years_ago) + ' (' + yr(ev.full_date) + ' г.)' + lifespan + '</div></div>' +
            '<span class="cal-ev-arrow">→</span></a>';
    }

    function select(dd) { clearPerson(); state.selected = dd; save(); render(); showDay(dd); document.getElementById('eventsList').scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    function showDay(dd) {
        var evs = dayEvents(dd);
        var el = document.getElementById('eventsList');
        if (!evs.length) { el.innerHTML = ''; return; }
        el.innerHTML = '<h2 class="cal-events-title">' + parseInt(dd) + ' ' + MONTHS[state.month - 1] + '</h2>' + evs.map(evCard).join('');
    }

    // ── Navigation ──
    function changeMonth(delta) {
        clearPerson();
        var m = state.month - 1 + delta, y = state.year;
        if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; }
        state.month = m + 1; state.year = y; state.selected = null;
        document.getElementById('eventsList').innerHTML = '';
        load();
    }
    document.getElementById('prevMonth').addEventListener('click', function(){ changeMonth(-1); });
    document.getElementById('nextMonth').addEventListener('click', function(){ changeMonth(1); });
    document.getElementById('todayBtn').addEventListener('click', function(){ clearPerson(); var n = new Date(); state.month = n.getMonth() + 1; state.year = n.getFullYear(); state.selected = String(n.getDate()).padStart(2,'0'); document.getElementById('eventsList').innerHTML=''; load(); });
    document.addEventListener('keydown', function(e){ if (e.target.tagName === 'INPUT') return; if (e.key === 'ArrowLeft') changeMonth(-1); else if (e.key === 'ArrowRight') changeMonth(1); });

    // filters + views
    Array.prototype.forEach.call(document.querySelectorAll('.cal-chip'), function(c){ c.addEventListener('click', function(){ state.filter = c.getAttribute('data-filter'); save(); render(); }); });
    Array.prototype.forEach.call(document.querySelectorAll('.cal-vbtn'), function(c){ c.addEventListener('click', function(){ state.view = c.getAttribute('data-view'); save(); render(); }); });

    // ── Month picker popover ──
    var picker = document.getElementById('picker'), pickerYear = state.year, pickerOpen = false;
    function renderPicker() {
        picker.innerHTML = '<div class="cal-picker-yr"><button data-yr="-1">◀</button><span>' + pickerYear + '</span><button data-yr="1">▶</button></div>' +
            '<div class="cal-picker-months">' + MONTHS.map(function(mn, i){
                var cur = (i + 1 === state.month && pickerYear === state.year) ? ' class="cur"' : '';
                return '<button data-m="' + (i + 1) + '"' + cur + '>' + mn.slice(0, 3) + '</button>';
            }).join('') + '</div>';
        picker.querySelector('[data-yr="-1"]').addEventListener('click', function(e){ e.stopPropagation(); pickerYear--; renderPicker(); });
        picker.querySelector('[data-yr="1"]').addEventListener('click', function(e){ e.stopPropagation(); pickerYear++; renderPicker(); });
        Array.prototype.forEach.call(picker.querySelectorAll('[data-m]'), function(b){ b.addEventListener('click', function(e){ e.stopPropagation(); clearPerson(); state.month = +b.getAttribute('data-m'); state.year = pickerYear; state.selected = null; document.getElementById('eventsList').innerHTML=''; closePicker(); load(); }); });
    }
    function openPicker() { pickerYear = state.year; renderPicker(); picker.classList.add('show'); pickerOpen = true; }
    function closePicker() { picker.classList.remove('show'); pickerOpen = false; }
    document.getElementById('monthYear').addEventListener('click', function(e){ e.stopPropagation(); pickerOpen ? closePicker() : openPicker(); });
    document.addEventListener('click', function(){ if (pickerOpen) closePicker(); });

    // ── Surprise me ──
    document.getElementById('surpriseBtn').addEventListener('click', function(){
        if (!allPeople.length) return;
        var pool = allPeople.filter(function(p){ return p.birth_date || p.death_date; });
        var p = pool[Math.floor(Math.random() * pool.length)];
        openPerson(p);
    });

    // ── Selected person box (opened from search) ──
    function clearPerson() { document.getElementById('personBox').innerHTML = ''; }
    function openPerson(p) {
        var d = p.birth_date || p.death_date;
        var dt = new Date(d);
        state.month = dt.getMonth() + 1; state.year = new Date().getFullYear();
        state.selected = String(dt.getDate()).padStart(2, '0');
        document.getElementById('eventsList').innerHTML = '';
        load();
        var ds = p.date_start || p.birth_date, de = p.date_end || p.death_date;
        var dates = [];
        if (p.date_label) {
            dates.push('📅 ' + esc(p.date_label) + ' ' + yr(ds) + (de ? '–' + yr(de) : '') + ' г.');
        } else {
            if (p.birth_date) dates.push('🎂 роден(а) ' + yr(p.birth_date) + ' г.');
            if (p.death_date) dates.push('🕯️ починал(а) ' + yr(p.death_date) + ' г.');
        }
        var box = document.getElementById('personBox');
        box.innerHTML = '<div class="cal-person">' +
            photoHtml({ name: p.name, image: p.image }, 'cal-person-photo') +
            '<div class="cal-person-info">' +
                '<div class="cal-person-eyebrow">Избрана личност</div>' +
                '<div class="cal-person-name">' + esc(p.name) + '</div>' +
                '<div class="cal-person-meta">' + (dates.join(' · ') || '-') + '</div>' +
                '<a class="cal-spot-link" href="address.html?slug=' + encodeURIComponent(p.slug) + '">Виж повече →</a>' +
            '</div>' +
            '<button class="cal-person-close" aria-label="Затвори">✕</button></div>';
        box.querySelector('.cal-person-close').addEventListener('click', clearPerson);
        box.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // ── Search ──
    function loadAll() { fetch('/api/calendar/all').then(function(r){ return r.json(); }).then(function(d){ allPeople = d || []; }).catch(function(){}); }
    var searchT;
    var searchInput = document.getElementById('searchInput'), searchRes = document.getElementById('searchResults');
    searchInput.addEventListener('input', function(){
        clearTimeout(searchT);
        var q = searchInput.value.trim().toLowerCase();
        if (q.length < 2) { searchRes.innerHTML = ''; return; }
        searchT = setTimeout(function(){
            var words = q.split(/\s+/);
            var hits = allPeople.filter(function(p){ var n = p.name.toLowerCase(); return words.every(function(w){ return n.indexOf(w) > -1; }); }).slice(0, 6);
            if (!hits.length) { searchRes.innerHTML = '<div class="cal-sr-empty">Няма резултати</div>'; return; }
            searchRes.innerHTML = hits.map(function(p, i){
                var ds = p.date_start || p.birth_date, de = p.date_end || p.death_date;
                var dates = [];
                if (p.date_label) {
                    dates.push('📅 ' + yr(ds) + (de ? '–' + yr(de) : ''));
                } else {
                    if (p.birth_date) dates.push('🎂 ' + yr(p.birth_date));
                    if (p.death_date) dates.push('🕯️ ' + yr(p.death_date));
                }
                var ini = esc(initial(p.name));
                var photo = p.image
                    ? '<img class="cal-sr-photo" src="' + esc(p.image) + '" alt="" loading="lazy" data-ini="' + ini + '" onerror="calImgErr(this)">'
                    : '<div class="cal-sr-photo ph">' + ini + '</div>';
                return '<div class="cal-sr" data-i="' + i + '">' + photo +
                    '<div><div class="cal-sr-name">' + esc(p.name) + '</div><div class="cal-sr-dates">' + dates.join(' · ') + '</div></div></div>';
            }).join('');
            Array.prototype.forEach.call(searchRes.querySelectorAll('.cal-sr'), function(row){
                row.addEventListener('click', function(){
                    var p = hits[+row.getAttribute('data-i')];
                    searchInput.value = ''; searchRes.innerHTML = '';
                    openPerson(p);
                });
            });
        }, 250);
    });
    document.addEventListener('click', function(e){ if (!e.target.closest('.cal-search-wrap')) searchRes.innerHTML = ''; });

    // ── Init ──
    loadAll();
    load();
})();
</script>
</body>
</html>
